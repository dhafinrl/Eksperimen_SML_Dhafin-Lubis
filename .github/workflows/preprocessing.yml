name: Preprocessing Data

on:
  push:
    branches:
      - main
    paths:
      - 'titanic_raw.csv'
      - 'preprocessing/automate_Dhafin-Lubis.py'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn
          
      - name: Run Preprocessing
        run: |
          cd preprocessing
          python automate_Dhafin-Lubis.py
          
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preprocessing/titanic_preprocessing/titanic_clean.csv
          git commit -m "Automated data preprocessing" -a || exit 0
          git push
